openapi: 3.0.0
info:
  title: GitHub API
  version: "1.0"
paths:
  /users:
    get:
      summary: Get users
      responses:
        '200':
          description: OK
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
servers:
  - url: https://api.github.com
