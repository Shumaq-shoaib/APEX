version: '3.8'

services:
  apex-dynamic:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+mysqlconnector://apex:apex@db/apex_db
    depends_on:
      - db
    volumes:
      - ../static_analysis:/static_analysis
    networks:
      - apex-net

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: apex_db
      MYSQL_USER: apex
      MYSQL_PASSWORD: apex
    ports:
      - "3306:3306"
    networks:
      - apex-net
    volumes:
      - apex_db_data:/var/lib/mysql

networks:
  apex-net:


volumes:
  apex_db_data:
